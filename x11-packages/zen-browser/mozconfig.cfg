# Cross compile options
ac_add_options --target=@TERMUX_HOST_PLATFORM@
ac_add_options --prefix=@TERMUX_PREFIX@
ac_add_options --with-sysroot=@TERMUX_PREFIX@
ac_add_options --custom-rust-target-triple=@CARGO_TARGET_NAME@

# Branding
ac_add_options --with-app-name=zen-browser
ac_add_options --with-app-basename=Zen
ac_add_options --with-distribution-id=app.zen-browser
ac_add_options --with-branding=browser/branding/release

ac_add_options --enable-update-channel=release

export MOZ_APP_REMOTINGNAME=zen-browser
export MOZ_APP_BASENAME=Zen
export MOZILLA_OFFICIAL=1

# Source repository info
export MOZ_SOURCE_REPO=https://github.com/zen-browser/desktop
export MOZ_SOURCE_CHANGESET=@TERMUX_PKG_VERSION@
export MOZ_INCLUDE_SOURCE_INFO=1

ac_add_options --enable-application=browser

# System libraries
ac_add_options --enable-system-ffi
ac_add_options --enable-system-pixman
ac_add_options --with-system-icu
ac_add_options --with-system-jpeg=@TERMUX_PREFIX@
ac_add_options --with-system-libevent
ac_add_options --with-system-libvpx
ac_add_options --with-system-nspr
ac_add_options --with-system-nss
ac_add_options --with-system-webp
ac_add_options --with-system-zlib

# Features
ac_add_options --enable-application=browser
ac_add_options --enable-audio-backends=pulseaudio
ac_add_options --enable-default-toolkit=cairo-gtk3-x11-only
ac_add_options --enable-minify=properties
ac_add_options --enable-mobile-optimize
ac_add_options --enable-printing
ac_add_options --enable-jxl

ac_add_options --disable-jemalloc
ac_add_options --disable-updater
ac_add_options --disable-sandbox
ac_add_options --disable-tests
ac_add_options --disable-accessibility
ac_add_options --disable-crashreporter
ac_add_options --disable-dbus
ac_add_options --disable-necko-wifi
ac_add_options --disable-hardening
ac_add_options --disable-parental-controls
ac_add_options --disable-webspeech
ac_add_options --disable-synth-speechd
ac_add_options --disable-elf-hack
ac_add_options --disable-address-sanitizer-reporter
ac_add_options --without-wasm-sandboxed-libraries

ac_add_options --with-unsigned-addon-scopes=app,system
ac_add_options --allow-addon-sideload

# Disable telemetry and data reporting
mk_add_options MOZ_DATA_REPORTING=
mk_add_options MOZ_SERVICES_HEALTHREPORT=
mk_add_options MOZ_TELEMETRY_REPORTING=
ac_add_options MOZ_DATA_REPORTING=
ac_add_options MOZ_TELEMETRY_REPORTING=

# Allow unsigned extensions
export MOZ_REQUIRE_SIGNING=
mk_add_options MOZ_REQUIRE_SIGNING=

ac_add_options --enable-optimize
ac_add_options --enable-release
ac_add_options --disable-debug
ac_add_options --disable-debug-symbols
ac_add_options --disable-debug-js-modules

# Disable DMD and ELF hacks, enable linker lld
ac_add_options --enable-linker=lld
ac_add_options --disable-elf-hack

# Stripping options for release builds
ac_add_options --enable-install-strip
ac_add_options --enable-strip
export STRIP_FLAGS="--strip-debug --strip-unneeded"
